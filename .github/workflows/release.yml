name: Release

on:
  push:
    branches:
      - main

jobs:
  quality-gate:
    name: Release quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/dev.db
          DIRECT_URL: file:./prisma/dev.db
      - run: npm run verify
      - run: npm run test:run
      - run: npm run build
        env:
          DATABASE_URL: file:./prisma/dev.db
          DIRECT_URL: file:./prisma/dev.db
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_SANITY_PROJECT_ID: dummy-project-id
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2024-01-01
          RESEND_API_KEY: re_dummy_api_key_for_ci_build
          RESEND_FROM_EMAIL: noreply@example.com
          RESEND_TO_EMAIL: contact@example.com

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: quality-gate
    # Evitar loop infinito: solo ejecutar si NO es un commit de release
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm
        # Node 22 LTS ships npm 10.9.x which mis-resolves lockfile v3 files
        # generated by npm 11+, producing spurious EUSAGE errors.
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/dev.db
          DIRECT_URL: file:./prisma/dev.db

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current branch
        id: branch
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "BRANCH=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Push changes and tags
        run: |
          git push --follow-tags origin ${{ steps.branch.outputs.BRANCH }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Extract changelog for current version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Extraer sección del CHANGELOG para esta versión
          sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d' > current-changelog.md

          # Si está vacío, usar un mensaje por defecto
          if [ ! -s current-changelog.md ]; then
            echo "Release ${VERSION}" > current-changelog.md
          fi

      - name: Create GitHub Release
        # Solo crear GitHub Release en main (producción)
        if: steps.branch.outputs.BRANCH == 'main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body_path: current-changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
